apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fte-worker-hpa
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: worker
spec:
  # Target the worker deployment
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fte-worker
  
  # Scaling bounds - workers can scale higher than API
  minReplicas: 3
  maxReplicas: 30
  
  # Scaling behavior
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
  
  # Metrics for scaling
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  
  # Note: For Kafka-based scaling, you would use KEDA (Kubernetes Event-Driven Autoscaling)
  # to scale based on Kafka topic lag. Example:
  #
  # apiVersion: keda.sh/v1alpha1
  # kind: ScaledObject
  # metadata:
  #   name: fte-worker-keda
  #   namespace: customer-success-fte
  # spec:
  #   scaleTargetRef:
  #     name: fte-worker
  #   minReplicaCount: 3
  #   maxReplicaCount: 30
  #   triggers:
  #   - type: kafka
  #     metadata:
  #       bootstrapServers: kafka.kafka.svc.cluster.local:9092
  #       consumerGroup: fte-message-processor
  #       topic: fte.tickets.incoming
  #       lagThreshold: "100"
