apiVersion: v1
kind: ConfigMap
metadata:
  name: fte-config
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
data:
  # Environment settings
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  
  # Kafka configuration
  KAFKA_BOOTSTRAP_SERVERS: "kafka.kafka.svc.cluster.local:9092"
  
  # PostgreSQL configuration
  POSTGRES_HOST: "postgres.customer-success-fte.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "fte_db"
  POSTGRES_USER: "fte_user"
  
  # Gemini AI configuration
  MODEL: "gemini-1.5-flash"
  MAX_TOKENS: "1000"
  
  # Channel settings
  GMAIL_ENABLED: "true"
  WHATSAPP_ENABLED: "true"
  WEBFORM_ENABLED: "true"
  
  # Message length limits
  MAX_EMAIL_LENGTH: "2000"
  MAX_WHATSAPP_LENGTH: "1600"
  MAX_WEBFORM_LENGTH: "1000"
  
  # Database pool settings
  DB_POOL_MIN_SIZE: "2"
  DB_POOL_MAX_SIZE: "10"
