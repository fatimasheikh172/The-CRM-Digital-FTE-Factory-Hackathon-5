apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: customer-success-fte
  labels:
    app: postgres
    component: database
spec:
  type: ClusterIP
  selector:
    app: postgres
    component: database
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
  clusterIP: None  # Headless service for StatefulSet
