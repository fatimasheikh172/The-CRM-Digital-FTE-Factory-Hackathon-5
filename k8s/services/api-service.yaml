apiVersion: v1
kind: Service
metadata:
  name: customer-success-fte
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: api
  annotations:
    # Prometheus annotations for service discovery
    prometheus.io/scrape: "true"
    prometheus.io/port: "80"
spec:
  type: ClusterIP
  selector:
    app: customer-success-fte
    component: api
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
    appProtocol: http
  
  # Session affinity (optional - for sticky sessions)
  sessionAffinity: None
  
  # IP family policy (for dual-stack clusters)
  # ipFamilyPolicy: SingleStack
  # ipFamilies:
  # - IPv4
