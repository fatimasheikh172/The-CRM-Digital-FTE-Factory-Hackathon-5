<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechCorp Support Form</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-8">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;
        
        const CATEGORIES = [
            { value: 'General', label: 'General Inquiry' },
            { value: 'Technical', label: 'Technical Support' },
            { value: 'Billing', label: 'Billing & Payments' },
            { value: 'Bug Report', label: 'Bug Report' },
            { value: 'Feedback', label: 'Feedback' },
            { value: 'Account', label: 'Account Issues' },
            { value: 'API', label: 'API Support' },
        ];
        
        const PRIORITIES = [
            { value: 'low', label: 'Low' },
            { value: 'medium', label: 'Medium' },
            { value: 'high', label: 'High' },
        ];
        
        function SupportForm() {
            const [formData, setFormData] = useState({
                name: '', email: '', subject: '', category: 'General',
                priority: 'medium', message: ''
            });
            const [errors, setErrors] = useState({});
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitStatus, setSubmitStatus] = useState(null);
            const [ticketId, setTicketId] = useState(null);
            
            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
                if (errors[name]) setErrors(prev => ({ ...prev, [name]: '' }));
            };
            
            const validateForm = () => {
                const newErrors = {};
                if (!formData.name.trim()) newErrors.name = 'Name is required';
                if (!formData.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) newErrors.email = 'Valid email required';
                if (!formData.subject.trim() || formData.subject.length < 5) newErrors.subject = 'Subject (min 5 chars)';
                if (!formData.message.trim() || formData.message.length < 10) newErrors.message = 'Message (min 10 chars)';
                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!validateForm()) return;
                setIsSubmitting(true);
                try {
                    const response = await fetch('/support/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    const data = await response.json();
                    if (response.ok) {
                        setSubmitStatus('success');
                        setTicketId(data.ticket_id);
                        setFormData({ name: '', email: '', subject: '', category: 'General', priority: 'medium', message: '' });
                    } else {
                        setSubmitStatus('error');
                    }
                } catch (error) {
                    setSubmitStatus('error');
                }
                setIsSubmitting(false);
            };
            
            const renderInput = (name, label, type = 'text', placeholder = '') => (
                <div className="mb-4">
                    <label className="block text-sm font-medium text-gray-700 mb-1">{label} *</label>
                    <input type={type} name={name} value={formData[name]} onChange={handleChange} placeholder={placeholder}
                        className={`w-full px-3 py-2 border rounded-lg ${errors[name] ? 'border-red-500 bg-red-50' : 'border-gray-300'}`} disabled={isSubmitting} />
                    {errors[name] && <p className="mt-1 text-sm text-red-600">{errors[name]}</p>}
                </div>
            );
            
            const renderSelect = (name, label, options) => (
                <div className="mb-4">
                    <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
                    <select name={name} value={formData[name]} onChange={handleChange} className="w-full px-3 py-2 border rounded-lg" disabled={isSubmitting}>
                        {options.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                    </select>
                </div>
            );
            
            return (
                <div className="max-w-2xl mx-auto p-6 bg-white rounded-xl shadow-lg">
                    <h2 className="text-2xl font-bold text-gray-900 mb-4">Contact TechCorp Support</h2>
                    {submitStatus === 'success' && (
                        <div className="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg">
                            <h3 className="font-medium text-green-800">Submission Received!</h3>
                            <p className="text-sm text-green-700 mt-1">Ticket ID: <span className="font-mono font-bold">{ticketId}</span></p>
                        </div>
                    )}
                    {submitStatus === 'error' && (
                        <div className="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
                            <h3 className="font-medium text-red-800">Submission Failed</h3>
                            <p className="text-sm text-red-700 mt-1">Please try again.</p>
                        </div>
                    )}
                    <form onSubmit={handleSubmit}>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {renderInput('name', 'Your Name', 'text', 'John Doe')}
                            {renderInput('email', 'Email', 'email', 'john@example.com')}
                        </div>
                        {renderInput('subject', 'Subject', 'text', 'Brief description')}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {renderSelect('category', 'Category', CATEGORIES)}
                            {renderSelect('priority', 'Priority', PRIORITIES)}
                        </div>
                        <div className="mb-4">
                            <label className="block text-sm font-medium text-gray-700 mb-1">Message *</label>
                            <textarea name="message" value={formData.message} onChange={handleChange} rows={5}
                                className={`w-full px-3 py-2 border rounded-lg ${errors[name] ? 'border-red-500' : 'border-gray-300'}`} disabled={isSubmitting} />
                            <p className="text-sm text-gray-500 mt-1">{formData.message.length}/5000 characters</p>
                        </div>
                        <button type="submit" disabled={isSubmitting}
                            className={`w-full py-3 px-4 rounded-lg text-white ${isSubmitting ? 'bg-blue-400' : 'bg-blue-600 hover:bg-blue-700'}`}>
                            {isSubmitting ? 'Submitting...' : 'Submit Request'}
                        </button>
                    </form>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<SupportForm />);
    </script>
</body>
</html>
